<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSip - La Taza Inteligente</title>
    <meta name="description" content="Reserva tu taza inteligente SmartSip y mantén tu café a la temperatura perfecta todo el día.">
    <link rel="stylesheet" href="style.css">           
</head>
<body>

    <header>
        <h1>SmartSip</h1>
    </header>

    <main>

        <section class="hero-section" aria-label="Sección de presentación del producto">
            
            <article class="hero-text">
                <h1>Tu café perfecto, siempre.</h1>
                <p>Mantén tu bebida a la temperatura ideal durante horas con la nueva SmartSip. Olvídate del café frío y mejora tu productividad.</p>


                <form id="formulario-reserva" action="#" method="GET">
                    <h2>Reserva la tuya hoy</h2>
                    

                    <div class="form-group">
                        <label for="nombre">Nombre completo:</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Ej: María Pérez" aria-required="true">
                    </div>
                    

                    <div class="form-group">
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com" aria-required="true">
                    </div>
                    

                    <button type="submit" class="btn-primario">Asegurar mi reserva</button>
                </form>

                <a href="components.html" class="btn-secundario">Ver Componentes y Diseño →</a>
            </article>

            <aside class="hero-image">

                <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?q=80&w=800&auto=format&fit=crop" 
                     alt="Taza de café humeante sobre una mesa de madera al lado de un ordenador" 
                     loading="lazy">
            </aside>

        </section>
    </main>


    <footer>
        <p>&copy; 2026 SmartSip Inc. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
